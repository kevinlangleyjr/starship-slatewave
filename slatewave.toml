# Slatewave -- Starship prompt
# https://getslatewave.com
#
# A two-line prompt on a slate foundation with a teal signature. Mirrors the
# layout of slatewave-omp (oh-my-posh) and shares its palette with the wider
# Slatewave family (VSCode, Obsidian, Alacritty, Ghostty, iTerm2). Editor,
# terminal, and prompt speak the same visual language.
#
# All glyphs are written as \uXXXX escapes inside double-quoted strings so the
# file is ASCII-safe on disk. Glyphs require a Nerd Font in your terminal.

"$schema" = "https://starship.rs/config-schema.json"

palette = "slatewave"
add_newline = true

format = """
[ŌĢŁŌöĆ](fg:teal_300)\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$git_commit\
$python\
$nodejs\
$golang\
$rust\
$java\
$cmake\
$docker_context\
$fill\
$cmd_duration\
$battery\
$memory_usage\
$time\
$line_break\
[ŌĢ░ŌöĆ](fg:teal_300)$character"""

# ---------------------------------------------------------------------------
# Palette -- canonical Slatewave colors + chrome extensions shared with the
# oh-my-posh prompt, so the two render identically side-by-side.
# ---------------------------------------------------------------------------

[palettes.slatewave]
bg_inset     = "#0f172a"
bg_elevated  = "#1e293b"
bg_raised    = "#21252b"
bg_base      = "#282c34"
chrome_dark  = "#2c313a"
chrome_light = "#3e4451"

fg_faint   = "#64748b"
fg_muted   = "#94a3b8"
fg_subtle  = "#cbd5e1"
fg_default = "#e2e8f0"
fg_bright  = "#f1f5f9"

teal_200 = "#99f6e4"
teal_300 = "#5eead4"
teal_600 = "#0f766e"
teal_700 = "#0e7490"
cyan_fg  = "#ecfeff"

sky_400    = "#38bdf8"
rose_400   = "#fb7185"
red_bright = "#ef5350"
purple     = "#b388ff"
amber_400  = "#fbbf24"
amber_700  = "#b45309"
orange     = "#ff4500"
git_ink    = "#193549"

# ---------------------------------------------------------------------------
# Left prompt
# ---------------------------------------------------------------------------

[os]
disabled = false
format = "[ $symbol ]($style)"
style = "fg:fg_default bg:chrome_light"

# Nerd Font OS glyphs. Ņé░ (powerline right arrow) trails into the next
# segment's background so the chain reads as a single pill.
[os.symbols]
Macos    = "’ģ╣"
Linux    = "’ģ╝"
Windows  = "’ģ║"
Ubuntu   = "’īø"
Arch     = "’īā"
Debian   = "’īå"
Fedora   = "’īŖ"
Alpine   = "’īĆ"
Redhat   = "’ī¢"
Raspbian = "’īĢ"
NixOS    = "’īō"
Unknown  = "’ģ╝"

[username]
show_always = false
format = "[ $user ]($style)"
style_user = "fg:fg_default bg:chrome_light"
style_root = "fg:rose_400 bg:chrome_light"

[hostname]
ssh_only = true
format = "[ ’ĀŚ  $hostname ]($style)"
style = "fg:fg_default bg:chrome_light"

[directory]
format = "[Ņé░](fg:chrome_light bg:chrome_dark)[ $path$read_only ]($style)"
style = "fg:teal_300 bg:chrome_dark"
truncation_length = 3
truncation_symbol = "ŌĆ”/"
read_only = " ’ĆŻ"
read_only_style = "fg:rose_400 bg:chrome_dark"
home_symbol = "’ĆĢ"

[git_branch]
format = "[Ņé░](fg:chrome_dark bg:sky_400)[ $symbol $branch ]($style)"
style = "fg:git_ink bg:sky_400"
symbol = "Ņ£ź"
truncation_length = 25
truncation_symbol = "ŌĆ”"

[git_status]
format = "([$all_status$ahead_behind ]($style))"
style = "fg:git_ink bg:sky_400"
conflicted = " ’ü▒"
ahead      = " ’üó${count}"
behind     = " ’üŻ${count}"
diverged   = " ’üó${ahead_count} ’üŻ${behind_count}"
up_to_date = ""
untracked  = " ’ä©${count}"
stashed    = " ’ÜÆ${count}"
modified   = " ’üä${count}"
staged     = " ’üå${count}"
renamed    = " ’ŗ¬${count}"
deleted    = " ’Ćö${count}"

[git_state]
format = "\\([$state( $progress_current/$progress_total)]($style)\\) "
style = "fg:amber_400 bg:sky_400"
rebase = "REBASE"
merge = "MERGE"
revert = "REVERT"
cherry_pick = "PICK"
bisect = "BISECT"
am = "AM"
am_or_rebase = "AM/REBASE"

[git_commit]
format = "[ $hash$tag ]($style)"
style = "fg:git_ink bg:sky_400"
only_detached = true
tag_disabled = false
tag_symbol = " ’Ć½"

# ---------------------------------------------------------------------------
# Language runtimes -- render after git (sky bg) on chrome_light bg. Leading
# arrow uses fg:sky_400 so the common (in-repo) case chains cleanly.
# ---------------------------------------------------------------------------

[python]
format = "[Ņé░](fg:sky_400 bg:chrome_light)[ $symbol $version(\\($virtualenv\\)) ]($style)"
style = "fg:teal_300 bg:chrome_light"
symbol = "ŅłĄ"

[nodejs]
format = "[Ņé░](fg:sky_400 bg:chrome_light)[ $symbol $version ]($style)"
style = "fg:teal_300 bg:chrome_light"
symbol = "Ņ£ś"

[golang]
format = "[Ņé░](fg:sky_400 bg:chrome_light)[ $symbol $version ]($style)"
style = "fg:teal_300 bg:chrome_light"
symbol = "Ņś¦"

[rust]
format = "[Ņé░](fg:sky_400 bg:chrome_light)[ $symbol $version ]($style)"
style = "fg:teal_300 bg:chrome_light"
symbol = "Ņ×©"

[java]
format = "[Ņé░](fg:sky_400 bg:chrome_light)[ $symbol $version ]($style)"
style = "fg:teal_300 bg:chrome_light"
symbol = "Ņ£Ė"

[cmake]
format = "[Ņé░](fg:sky_400 bg:teal_600)[ $symbol $version ]($style)"
style = "fg:cyan_fg bg:teal_600"
symbol = "Ņ×ö"

[docker_context]
format = "[Ņé░](fg:sky_400 bg:chrome_light)[ $symbol $context ]($style)"
style = "fg:teal_300 bg:chrome_light"
symbol = "’īł"
only_with_files = true

# ---------------------------------------------------------------------------
# Right prompt
# ---------------------------------------------------------------------------

[fill]
symbol = " "

[cmd_duration]
min_time = 500
show_milliseconds = false
format = "[ ’ēÆ $duration ]($style)"
style = "fg:fg_subtle"

[battery]
format = "[ $symbol$percentage ]($style)"

[[battery.display]]
threshold = 100
charging_symbol    = "’ā¦ "
discharging_symbol = "’ēĆ "
style = "fg:cyan_fg bg:teal_700"

[[battery.display]]
threshold = 30
charging_symbol    = "’ā¦ "
discharging_symbol = "’ēü "
style = "fg:cyan_fg bg:amber_700"

[memory_usage]
disabled = false
threshold = -1
format = "[ $symbol ${ram_pct} ]($style)"
style = "fg:fg_muted bg:chrome_light"
symbol = "’ŗø"

[time]
disabled = false
time_format = "%-I:%M %p"
format = "[ ’ĆŚ $time ]($style)"
style = "fg:teal_300 bg:chrome_dark"

# ---------------------------------------------------------------------------
# Second line -- teal arrow on success, rose arrow on non-zero exit
# ---------------------------------------------------------------------------

[character]
success_symbol = "[ŌØ»](fg:teal_300)"
error_symbol   = "[ŌØ»](fg:red_bright)"
vimcmd_symbol  = "[ŌØ«](fg:teal_200)"
